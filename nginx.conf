# nginx reverse proxy for reqmesh — alternative to Caddy.
#
# Place at /etc/nginx/sites-available/reqmesh and symlink into sites-enabled,
# or mount into a Docker nginx container. Requires manually provisioned TLS
# certificates (see DEPLOYMENT.md for mkcert instructions).
#
# Critical: proxy_buffering must be OFF for Server-Sent Events to work.
# The 24h read timeout prevents the SSE stream from being disconnected.

upstream reqmesh_backend {
    server reqmesh:8000;
}

server {
    listen 80;
    server_name localserver.reqmesh.com;
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name localserver.reqmesh.com;

    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Main location — proxy to FastAPI backend
    location / {
        proxy_pass http://reqmesh_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Required for SSE (real-time collaboration)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding off;
    }

    # API health check
    location /health {
        proxy_pass http://reqmesh_backend;
        access_log off;
    }

    # Increase upload size for ReqIF/SysML import files
    client_max_body_size 50M;
}
